services:
  app:
    image: rust:1.95-slim-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - cargo_registry:/usr/local/cargo/registry
      - cargo_target:/app/target
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - ROCKET_ADDRESS=0.0.0.0
      - ROCKET_PORT=8080
    command: cargo run

volumes:
  cargo_registry:
  cargo_target:
