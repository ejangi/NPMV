name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog and tags

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build project
        run: cargo build --release

      - name: Check version and release status
        id: check_release
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          # Fetch tags to ensure we have the latest remote tags
          git fetch --tags
          
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists, skipping release creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist, creating new release."
          fi

      - name: Generate Changelog
        if: steps.check_release.outputs.exists == 'false'
        id: changelog
        run: |
          # Find the latest tag
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || "")
          if [ -z "$latest_tag" ]; then
            log=$(git log --pretty=format:"* %s (%h)" --no-merges)
          else
            log=$(git log ${latest_tag}..HEAD --pretty=format:"* %s (%h)" --no-merges)
          fi
          
          # Default fallback if there are no new commits
          if [ -z "$log" ]; then
            log="* New release update"
          fi
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$log" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_release.outputs.tag }}
          name: Release ${{ steps.check_release.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
